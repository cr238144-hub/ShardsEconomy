name: Build Plugin

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn package
      - uses: actions/upload-artifact@v3
        with:
          name: ShardsEconomy
          path: target/ShardsEconomy-1.0.0.jar
